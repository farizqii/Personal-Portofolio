<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Portfolio</title>
        <meta name="description" content="My personal portfolio website" />
        <link href="./dist/output.css" rel="stylesheet">
    </head>

    <body class="bg-primary-bg text-primary-txt font-sans">

        <header id="header" class="fixed top-0 z-50 w-full pt-4 backdrop-blur-sm">
            <div class="container mx-auto px-2">
                <div class="rounded-full border border-black bg-primary-action shadow-lg">
                    <div class="flex h-12 items-center justify-between px-3">
                        <!-- Pr -->
                        <div class="flex flex-1 items-center">
                            <!-- Profile Name -->
                            <span class="text-shadow-lg text-lg font-bold tracking-wide text-white px-2 py-2.5">
                                Euqin's Artworks
                            </span>
                        </div>

                        <!-- Navigation Links -->
                        <nav class="hidden md:block">
                            <ul class="flex item-center gap-6 text-sm font-extrabold">
                                <li><a class="text-shadow-lg block px-5 py-2.5 text-white transition hover:bg-white/50 hover:text-primary-txt" href="#">About Me</a></li>
                                <li><a class="text-shadow-lg block px-5 py-2.5 text-white transition hover:bg-white/50 hover:text-primary-txt" href="#">My Works</a></li>
                                <li><a class="text-shadow-lg block px-5 py-2.5 text-white transition hover:bg-white/50 hover:text-primary-txt" href="#">Contact</a></li>
                            </ul>
                        </nav>

                        <!-- Button Wrapper -->
                        <div class="flex flex-1 items-center justify-end gap-4 ">
                            <!-- Mobile Hamburger Button -->
                            <button class=" bg-white/20 p-2.5 rounded-full hover:bg-white/80 focus:outline-none focus:ring-2 focus:ring-gray-400" aria-label="Toggle menu">
                                <!-- SVG Hamburger Icon -->
                                <span class="sr-only">Toggle menu</span>
                                <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" href="#" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="min-h-screen pt-24 pb-12">
            
            <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 items-center gap-16 lg:grid-cols-2 lg:gap-12">
                    <div class="flex flex-col justify-center">
                        <h1 class="text-shadow-lg mb-6 text-4xl font-extrabold leading-tight tracking-tight text-primary-txt sm:text-5xl">
                            Welcome to <span class="text-primary-action">Euqin's</span>.<br> Portofolio.
                        </h1>

                        <p class="text-shadow-lg mb-8 text-lg leading-relaxed text-primary-txt/80">
                            Hello, everyone! My name is <span class="italic font-bold text-primary-action">Euqin</span>. I'm a 2d Artist passionated in creating digital arts and illustrations, looking forward to collaborate and contribute for any innovative projects! 😄
                        </p>

                        <div class="flex flex-wrap gap-4">
                            <button class="rounded-md bg-primary-action px-6 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-primary-action/90 focus:outline-none focus:ring-2 focus:ring-primary-action focus:ring-offset-2">
                                Contact Me
                            </button>
                        </div>
                    </div>
                    
                    <div class="relative flex items-center justify-center">
                        <div class="flex aspect-square w-full max-w-md items-center justify-center rounded-2xl border border-primary-action/20 bg-primary-action/5 shadow-lg backdrop-blur-sm">
                            <img src="assets/img/Euqin-pfp.png" alt="Profile Image" class="object-cover rounded-2xl">
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
